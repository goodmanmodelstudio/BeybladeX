<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷屆賽事紀錄 - 好男人陀螺實驗室</title>
    <link rel="stylesheet" href="style/modern.css">
    <style>
        .records-list {
            max-width: 600px;
            margin: 40px auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .record-item-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            text-decoration: none;
            color: var(--text-main);
        }
        .record-item-card .date {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            color: var(--neon-cyan);
            font-size: 15px;
        }
        .record-item-card .title {
            font-weight: 600;
            font-size: 16px;
        }
        .record-item-card .arrow {
            color: var(--text-muted);
            transition: transform 0.2s ease;
        }
        .record-item-card:hover .arrow {
            transform: translateX(5px);
            color: var(--neon-cyan);
        }
    </style>
</head>
<body>
    <div id="header"></div> <!-- 動態載入 Header -->

    <main class="main-container text-center">
        <h2 class="section-title" style="margin-top: 30px;">歷屆賽事紀錄 TOURNAMENT ARCHIVES</h2>
        <p style="color: var(--text-muted); font-size:14px;">
            回顧過往在各地舉辦的精彩比賽，觀看對戰表樹狀圖與 YouTube 賽事精采播放列表。
        </p>

        <div class="records-list">
            <!-- 賽事 1 -->
            <a href="20240518/index.html" class="glass-panel record-item-card">
                <span class="date">2024/05/18</span>
                <span class="title">新竹大遠百 32人對戰</span>
                <span class="arrow">➔</span>
            </a>

            <!-- 賽事 2 -->
            <a href="20240519/index.html" class="glass-panel record-item-card">
                <span class="date">2024/05/19</span>
                <span class="title">竹北 6+ 16人對戰</span>
                <span class="arrow">➔</span>
            </a>
            
            <!-- 賽事 3 (20240526) -->
            <a href="20240526/index.html" class="glass-panel record-item-card">
                <span class="date">2024/05/26</span>
                <span class="title">大會精彩賽事紀錄</span>
                <span class="arrow">➔</span>
            </a>

            <!-- 賽事 4 (20240825) -->
            <a href="20240825/index.html" class="glass-panel record-item-card">
                <span class="date">2024/08/25</span>
                <span class="title">夏日杯對戰紀錄</span>
                <span class="arrow">➔</span>
            </a>
            
            <!-- 未來可在這裏手動增加對戰連結 -->
        </div>
    </main>

    <div id="footer"></div> <!-- 動態載入 Footer -->

    <script>
        // 動態載入 Header
        fetch('layout/header.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('header').innerHTML = data;
            });

        // 動態載入 Footer
        fetch('layout/footer.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('footer').innerHTML = data;
            });
    </script>
</body>
</html>
