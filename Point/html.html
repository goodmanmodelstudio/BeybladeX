<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>裁判計分終端 - 好男人陀螺實驗室</title>
    <!-- 引入 Bootstrap 5 (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 引入大會統一現代化電競樣式 -->
    <link rel="stylesheet" href="../style/modern.css">
    <style>
        body {
            padding-bottom: 40px;
        }
        .score-display-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .score-display-box.active-left {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
        }
        .score-display-box.active-right {
            border-color: var(--neon-magenta);
            box-shadow: 0 0 20px rgba(255, 8, 68, 0.15);
        }
        .score-display {
            font-size: 6rem;
            margin: 10px 0;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
        }
        .scoring-btn-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .referee-container {
            max-width: 700px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .control-btns {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .control-btns button {
            flex: 1;
        }
        /* 等待指派遮罩頁面 */
        #referee-waiting-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-dark);
            z-index: 9999;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-ring {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(0, 242, 254, 0.08);
            border-top-color: var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1.2s infinite linear;
            margin: 30px auto;
        }
        #stadium-indicator {
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            letter-spacing: 2px;
            padding: 5px 12px;
            background: rgba(0, 242, 254, 0.1);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 242, 254, 0.2);
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 20px;
        }
        /* 全螢幕慢動作裁判回放面板 (Modal Overlay) */
        #replay-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(9, 11, 15, 0.96);
            backdrop-filter: blur(10px);
            z-index: 10050; /* 比等待遮罩更高 */
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .replay-modal-content {
            width: 100%;
            max-width: 640px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
        }
        .modal-video-container {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #modal-replay-viewer {
            width: 100%;
            max-height: 50vh;
            display: block;
            object-fit: contain;
        }
        /* 加大進度條樣式 */
        .custom-scrubber {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.15);
            outline: none;
            margin: 15px 0 5px 0;
            transition: background 0.3s;
        }
        .custom-scrubber::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-cyan);
            border: 2px solid #fff;
            transition: transform 0.1s;
        }
        .custom-scrubber::-webkit-slider-thumb:active {
            transform: scale(1.2);
        }
        .custom-scrubber::-moz-range-thumb {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--neon-cyan);
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-cyan);
            border: 2px solid #fff;
            transition: transform 0.1s;
        }
        .custom-scrubber::-moz-range-thumb:active {
            transform: scale(1.2);
        }
        .btn-replay-control {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            touch-action: manipulation; /* 禁用雙擊放大手勢，防止快速連點時畫面放大 */
        }
        .speed-btn-group button {
            flex: 1;
        }
    </style>
</head>
<body>
    <!-- 裁判等待中遮罩 -->
    <div id="referee-waiting-overlay">
        <h2 class="text-glow-cyan" style="font-family: 'Orbitron', sans-serif; font-weight:900;">好男人陀螺實驗室 🧪</h2>
        <div id="stadium-overlay-indicator" style="margin-top: 15px; font-size:18px; font-weight:600;">對戰台 A - 裁判計分端</div>
        <div class="loading-ring"></div>
        <p style="color: var(--text-muted); font-size: 15px; max-width: 300px; line-height: 1.6;">
            ⏳ 目前該對戰台處於空閒狀態。<br>請等待管理員在後台指派新選手對戰，系統將會自動載入並開始！
        </p>
    </div>

    <!-- 頂部 Header -->
    <header>
        <h1>好男人陀螺實驗室 🧪</h1>
        <nav id="referee-nav">
            <a href="../index.html">首頁</a>
            <a href="../admin.html">賽事管理</a>
            <a href="../dashboard.html">即時總覽大螢幕</a>
        </nav>
    </header>

    <div class="container referee-container">
        <div class="text-center mb-4">
            <span id="stadium-indicator" style="display:none;">對戰台 A 終端</span>
            <h2 class="section-title" id="terminal-title">單機自帶計分板</h2>
        </div>

        <!-- 即時相機與慢動作回放卡片 -->
        <div class="glass-panel p-3 mb-4" id="camera-card" style="position: relative;">
            <div style="position: relative; overflow: hidden; border-radius: 8px;">
                <video id="camera-preview" autoplay playsinline muted style="width: 100%; height: 180px; object-fit: contain; background: #000; display: block; border-radius: 8px;"></video>
                <video id="replay-viewer" playsinline muted controls style="width: 100%; height: 180px; object-fit: contain; background: #000; display: none; border-radius: 8px;"></video>
                
                <!-- 慢動回放控制按鈕 (覆蓋在視訊上方) -->
                <div id="replay-speed-controls" style="display: none; position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); padding: 5px 12px; border-radius: 20px; gap: 6px; align-items: center; border: 1px solid var(--border-color); backdrop-filter: blur(5px); z-index:10; white-space: nowrap;">
                    <span style="font-size: 10px; color: var(--neon-gold); font-family: 'Orbitron', sans-serif; font-weight:700; margin-right: 2px;">REPLAY:</span>
                    <button class="btn btn-sm btn-neon btn-neon-dark py-0 px-2" style="font-size:10px;" onclick="changeReplaySpeed(0.25)">0.25x</button>
                    <button class="btn btn-sm btn-neon btn-neon-dark py-0 px-2" style="font-size:10px;" onclick="changeReplaySpeed(0.5)">0.5x</button>
                    <button class="btn btn-sm btn-neon btn-neon-dark py-0 px-2" style="font-size:10px;" onclick="changeReplaySpeed(1.0)">1.0x</button>
                    <button class="btn btn-sm btn-neon btn-neon-cyan py-0 px-2" style="font-size:10px;" onclick="downloadRecordedVideo()" title="下載此回合影片至手機">📥 下載</button>
                    <button class="btn btn-sm btn-neon btn-neon-magenta py-0 px-2" style="font-size:10px;" onclick="closeReplay()">✕</button>
                </div>
            </div>
            
            <div class="row g-2 mt-2">
                <div class="col-6">
                    <button id="btn-camera-toggle" class="btn btn-neon btn-neon-dark w-100 py-2" onclick="initCamera()" style="font-size:13px; height: 100%;">📷 啟動高速鏡頭</button>
                </div>
                <div class="col-6">
                    <button id="btn-record-action" class="btn btn-neon btn-neon-cyan w-100 py-2" onclick="toggleRecording()" style="font-size:13px; height: 100%;" disabled>🔴 開始錄影</button>
                </div>
            </div>
            <button id="btn-replay-last" class="btn btn-neon btn-neon-dark w-100 py-2 mt-2" onclick="reopenLastReplay()" style="font-size:13px; display: none;">👁️ 重播本回合對戰影片 (慢動作/進度條)</button>
        </div>

        <div class="row g-4 text-center">
            <!-- 選手 1 (左側) -->
            <div class="col-6">
                <div class="score-display-box active-left">
                    <input type="text" id="player1-name-input" value="玩家 1" class="form-input text-center text-glow-cyan" style="font-weight: 800; font-size:18px;">
                    <h1 id="score1" class="score-display text-glow-cyan">0</h1>
                </div>
                <div class="scoring-btn-grid mt-4">
                    <button class="btn btn-neon btn-neon-cyan w-100" onclick="addScore('player1', 1, '轉停')">轉停 +1</button>
                    <button class="btn btn-neon btn-neon-cyan w-100" onclick="addScore('player1', 2, '擊飛')">擊飛 +2</button>
                    <button class="btn btn-neon btn-neon-cyan w-100" onclick="addScore('player1', 2, '爆裂')">爆裂 +2</button>
                    <button class="btn btn-neon btn-neon-cyan w-100" onclick="addScore('player1', 3, '極限')">極限 +3</button>
                </div>
            </div>

            <!-- 選手 2 (右側) -->
            <div class="col-6">
                <div class="score-display-box active-right">
                    <input type="text" id="player2-name-input" value="玩家 2" class="form-input text-center text-glow-magenta" style="font-weight: 800; font-size:18px;">
                    <h1 id="score2" class="score-display text-glow-magenta">0</h1>
                </div>
                <div class="scoring-btn-grid mt-4">
                    <button class="btn btn-neon btn-neon-magenta w-100" onclick="addScore('player2', 1, '轉停')">轉停 +1</button>
                    <button class="btn btn-neon btn-neon-magenta w-100" onclick="addScore('player2', 2, '擊飛')">擊飛 +2</button>
                    <button class="btn btn-neon btn-neon-magenta w-100" onclick="addScore('player2', 2, '爆裂')">爆裂 +2</button>
                    <button class="btn btn-neon btn-neon-magenta w-100" onclick="addScore('player2', 3, '極限')">極限 +3</button>
                </div>
            </div>
        </div>

        <!-- 操控按鈕列 -->
        <div class="control-btns mt-5">
            <button class="btn btn-neon btn-neon-dark" onclick="swapPlayers()" id="btn-swap">交換位置</button>
            <button class="btn btn-neon btn-neon-dark" onclick="undoLastScore()" id="btn-undo" title="復原上一次計分誤觸">↩ 復原上一動</button>
            <button class="btn btn-neon btn-neon-dark" onclick="resetGame()" id="btn-reset">重新開始</button>
            <button class="btn btn-neon btn-neon-cyan" onclick="exportToExcel()" id="btn-export">匯出結果</button>
            <button class="btn btn-neon btn-neon-cyan" style="display:none;" id="btn-submit">送出對戰結果 🏁</button>
        </div>

        <!-- 本地/大會對戰歷史明細 -->
        <div class="glass-panel mt-5 p-4" id="details-section">
            <h3 style="font-family: 'Orbitron', sans-serif; font-size: 16px; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">對戰歷程 BATTLE HISTORY</h3>
            <div id="match-details" style="color: var(--text-muted);">
                <!-- 本局明細 -->
            </div>
            <h3 id="winner-display" class="winner text-center text-glow-gold mt-4"></h3>
        </div>

        <!-- 大會聯網登入區 (僅在單機模式下顯示) -->
        <div class="glass-panel p-4 mt-5" id="distributed-login-card">
            <h3 class="text-glow-cyan" style="font-family: 'Orbitron', sans-serif; font-size: 16px; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 8px;">🏆 切換至大會多裁判聯網模式</h3>
            <p style="font-size: 13px; color: var(--text-muted);">
                如果您是大會裁判，請在此輸入指派給您的對戰台編號，登入大會計分終端或產生手機掃描二維碼。
            </p>
            <div class="row align-items-center g-3 mt-2">
                <div class="col-sm-4">
                    <input type="number" id="login-stadium-id" class="form-input" min="1" max="10" placeholder="對戰台編號 (例如: 1)">
                </div>
                <div class="col-sm-8 d-flex gap-3">
                    <button class="btn btn-neon btn-neon-cyan flex-1" onclick="loginToStadium()">登入此終端 ➔</button>
                    <button class="btn btn-neon btn-neon-dark flex-1" onclick="generateStadiumQR()">產生手機掃描 QR</button>
                </div>
            </div>
            
            <!-- QR Code 顯示區域 -->
            <div id="qr-display-area" style="display:none; text-align: center; margin-top: 25px; border-top: 1px dashed var(--border-color); padding-top: 20px;">
                <h4 style="font-size: 13px; color: var(--text-muted); margin-bottom: 15px;">請使用手機相機或 LINE 掃描下方 QR 碼以開啟評分頁面：</h4>
                <div style="background: white; padding: 15px; display: inline-block; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4);">
                    <img id="stadium-qr-image" src="" alt="Stadium QR Code" style="width: 180px; height: 180px;">
                </div>
                <p id="stadium-qr-url" style="font-size: 11px; color: var(--neon-cyan); margin-top: 12px; font-family: monospace; word-break: break-all;"></p>
            </div>
        </div>
    </div>

    <!-- 🎥 全螢幕慢動作裁判回放面板 (Modal Overlay) -->
    <div id="replay-modal">
        <div class="replay-modal-content">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 id="replay-modal-title" class="text-glow-cyan m-0" style="font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight:800; letter-spacing: 1px;">
                    ⚡ ROUND REPLAY 慢動作判定
                </h4>
                <button class="btn btn-sm btn-neon btn-neon-magenta py-1 px-3" onclick="closeModalReplay()" style="font-size:12px;">✕ 關閉</button>
            </div>
            
            <div class="modal-video-container">
                <video id="modal-replay-viewer" playsinline muted></video>
            </div>
            
            <!-- 加大進度條 -->
            <input type="range" id="modal-replay-scrubber" class="custom-scrubber" min="0" max="100" step="0.01" value="0">
            <div class="d-flex justify-content-between text-muted" style="font-size: 11px; font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 0.5px;">
                <span id="modal-replay-time-current" class="text-glow-cyan">0.00s</span>
                <span id="modal-replay-time-total">0.00s</span>
            </div>
            
            <!-- 影格與控制列 -->
            <div class="d-flex justify-content-between align-items-center mt-3 gap-2">
                <button class="btn btn-neon btn-neon-dark btn-replay-control py-2 flex-1" style="font-size:12px;" onclick="stepReplayFrame(-0.05)" title="後退 1 影格 (0.05秒)">⏪ 逐格後退</button>
                <button id="btn-modal-play-pause" class="btn btn-neon btn-neon-cyan btn-replay-control py-2 px-4" style="font-size:12px;" onclick="toggleModalPlay()">⏸ 暫停</button>
                <button class="btn btn-neon btn-neon-dark btn-replay-control py-2 flex-1" style="font-size:12px;" onclick="stepReplayFrame(0.05)" title="前進 1 影格 (0.05秒)">⏩ 逐格前進</button>
            </div>
            
            <!-- 速度選擇與全螢幕/下載 -->
            <div class="row g-2 mt-2">
                <div class="col-8">
                    <div class="d-flex gap-1 speed-btn-group" id="modal-speed-group">
                        <button id="btn-speed-025" class="btn btn-sm btn-neon btn-neon-dark py-2 px-1" style="font-size:10px;" onclick="changeModalReplaySpeed(0.25)">0.25x</button>
                        <button id="btn-speed-05" class="btn btn-sm btn-neon btn-neon-dark py-2 px-1" style="font-size:10px;" onclick="changeModalReplaySpeed(0.5)">0.5x</button>
                        <button id="btn-speed-10" class="btn btn-sm btn-neon btn-neon-dark py-2 px-1" style="font-size:10px;" onclick="changeModalReplaySpeed(1.0)">1.0x</button>
                    </div>
                </div>
                <div class="col-4 d-flex gap-1">
                    <button class="btn btn-sm btn-neon btn-neon-dark py-2 flex-1" style="font-size:10px;" onclick="toggleFullscreenReplay()" title="全螢幕播放">📺 全螢幕</button>
                    <button id="btn-modal-download" class="btn btn-sm btn-neon btn-neon-cyan py-2 flex-1" style="font-size:10px;" onclick="downloadModalRecordedVideo()" title="下載此影片至手機">📥 下載</button>
                </div>
            </div>
        </div>
    </div>


    <!-- Firebase SDKs compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <!-- Excel Export JS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    
    <!-- Firebase config and service helper -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/firebase-service.js"></script>
    <!-- Point script -->
    <script src="script.js"></script>
</body>
</html>
